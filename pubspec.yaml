name: aiaprtd_member
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  provider: ^6.1.5+1
  firebase_core: ^4.9.0
  audioplayers: ^6.6.0
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  flutter_compass: ^0.8.1
  image_picker: ^1.1.2
  firebase_storage: ^13.4.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 📌 ඇසෙට්ස් (Logo & Sound) ලියාපදිංචි කරපු කොටස
  assets:
    - assets/images/logo.png
    - assets/sounds/intro.mp3
    - assets/sounds/go_sound.mp3
    - assets/sounds/off_sound.mp3
    - assets/vehicles.json